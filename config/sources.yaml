# Source registry and fetch policy for all collectors.
# Compliance rules (guide sec 6): public sources only, respect robots.txt
# and terms of use, no paywalled scraping, rate-limit every fetcher.

defaults:
  min_seconds_between_requests: 2   # per domain
  respect_robots_txt: true
  user_agent: >-
    case-framework-evidence/0.1 (research pipeline for the CASE Framework
    paper; contact: st245@cornell.edu)
  cache_dir: data/raw
  timeout_seconds: 30
  max_retries: 3

sources:
  aiid:
    name: AI Incident Database
    kind: snapshot
    base_url: https://incidentdatabase.ai
    # Verified 2026-07-15: weekly public snapshots (JSON/MongoDB/CSV inside
    # tar.bz2) listed at https://incidentdatabase.ai/research/snapshots/.
    # Pinned to a specific snapshot for reproducibility.
    snapshot_url: https://pub-72b2b2fc36ec423189843747af98f80e.r2.dev/backup-20260713110347.tar.bz2
    snapshot_date: "2026-07-13"
    incident_url_template: https://incidentdatabase.ai/cite/{incident_id}
    notes: >-
      Filter to incidents from 2023 onward mentioning agent-relevant terms.
      Widened 2026-07-16 (author-approved pool expansion): the original six
      terms reached only 49 of 1044 2023+ incidents; tuning against the
      cached incidents.csv added the terms below (+107 candidates). Terms
      are prefix-matched at word start, so 'agent' already covers
      'agentic', 'autonomous' covers 'autonomous system', 'assistant'
      covers 'coding/AI/virtual assistant', and 'chatbot' covers the
      suggested 'chatbot action' (0 literal hits). 'jailbroken' is listed
      separately because prefix matching does not derive it from
      'jailbreak'. MIT / arXiv keep the narrow base list: both coded 0
      includes out of 169 candidates in the v2 run, so widening them adds
      coding cost with no expected yield.
    filter_terms:
      - agent
      - autonomous
      - tool use
      - multi-step
      - orchestration
      - copilot action
      # --- widened 2026-07-16 ---
      - assistant
      - copilot
      - chatbot
      - LLM-driven
      - prompt injection
      - jailbreak
      - jailbroken
      - automated system
    min_date: "2023-01-01"
    # Author-vetted targeted L2/L3 additions (2026-07-16): specific AIID
    # incidents that the keyword screen misses but a manual rescan surfaced
    # as genuine multi-agent-coupling (L2) or oversight-failure (L3) cases.
    # These bypass only the term gate, never the date gate (see aiid.py).
    force_include_ids:
      - "1556"  # Grok decodes Morse prompt -> Bankrbot executes ~$200K transfer (L2, inter-agent)
      - "1054"  # Anthropic: Claude orchestrating 100+ influence-op bots (L2, swarm)
      - "1442"  # Kiro agent -> 13h AWS Cost Explorer outage; 2-person approval bypassed (L3)
      - "591"   # Cigna PXDX auto-rejects claims; physician review a rubber-stamp (L3)
    cache_subdir: aiid

  mit_risk_repo:
    name: MIT AI Risk Repository
    kind: spreadsheet
    base_url: https://airisk.mit.edu
    # Verified 2026-07-15: public Google Sheet published for copying at
    # airisk.mit.edu/risks ("copy the full database on Google Sheets").
    # Data licensed CC BY 4.0 per airisk.mit.edu.
    sheet_id: 15LeHcpeuZC9txkvcaMoh3sUhkMvdMMry69xxXL46DT0
    export_url: https://docs.google.com/spreadsheets/d/15LeHcpeuZC9txkvcaMoh3sUhkMvdMMry69xxXL46DT0/export?format=xlsx
    license_note: CC BY 4.0 (stated at airisk.mit.edu)
    # This is an author-published explicit dataset download link, not
    # crawled content; robots.txt enforcement applies to crawl-type
    # fetchers, not to this single invited download.
    explicit_dataset_link: true
    notes: >-
      Keeps the narrow base terms (not the widened AIID list): 0/160
      MIT candidates were included in the v2 coding run — risk excerpts,
      not incidents — so widening here is pure coding cost.
    filter_terms:
      - agent
      - autonomous
      - tool use
      - multi-step
      - orchestration
      - copilot action
    cache_subdir: mit_risk_repo

  arxiv:
    name: arXiv API
    kind: api
    base_url: http://export.arxiv.org/api/query
    notes: >-
      Harvest concrete documented incidents described WITHIN failure-mode
      papers, not the papers themselves.
    search_terms:
      - LLM agent failure
      - multi-agent failure
      - agent safety incident
      - prompt injection agent
    # Narrow base terms, same rationale as mit_risk_repo (0/9 included in v2).
    filter_terms:
      - agent
      - autonomous
      - tool use
      - multi-step
      - orchestration
      - copilot action
    cache_subdir: arxiv

  web_reports:
    name: Curated postmortems and field studies
    kind: curated_list
    notes: >-
      Hand-curated vendor postmortems, observability-provider field studies,
      and engineering-blog incident writeups. Candidate additions are
      proposed and the author approves. Status values: seed | proposed |
