# Rejected candidates (logged with reasons per the study protocol — excluded
# for cause, not for capacity). These do NOT enter coding.
rejected:
  - id: wandb_weave
    name: Weights & Biases Weave
    reason: >-
      Documentation host (weave-docs.wandb.ai) returns HTTP 403 to automated
      fetchers (Cloudflare bot protection) on every doc URL; cannot be coded
      reproducibly from machine-fetched documentation.
  - id: robust_intelligence
    name: Robust Intelligence AI Firewall
    reason: >-
      Own docs host is DNS-dead (ENOTFOUND) and the product site refuses
      connections; the standalone product was folded into Cisco AI Defense
      after acquisition. No stable first-party documentation to code.
  - id: bedrock_agents_classic
    name: Amazon Bedrock Agents (classic)
    reason: >-
      AWS documentation states classic Bedrock Agents enters maintenance mode
      and closes to new customers 2026-07-30; superseded by Bedrock AgentCore.
      Excluded to keep the registry to current, generally-available tooling.
  - id: meta_llama_guard
    name: Meta Llama Guard
    reason: >-
      The Meta developer documentation page returns only a JS shell (no
      extractable capability text) to the fetcher; cannot verify or code.

