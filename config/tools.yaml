# Study 2 tool registry: the agent-ops tooling ecosystem coded against the
# CASE mechanism classes (config/mechanism_classes.yaml). Enumerated
# 2026-07-16 via three research passes (observability/eval, guardrails/
# gateway, orchestration/HITL) with fetchable-doc verification.
#
# Status lifecycle: proposed | approved | rejected (author approval gate).
# layers_hint is the research pass's ROUGH read of which layers each tool's
# docs plausibly touch — NOT the coding; the Full/Partial/None coder decides
# from the doc text against the mechanism classes.
#
# The paper hypothesizes DENSE L1 (control/guardrails) and L4 (eval/ops)
# coverage, SPARSE L2 (interaction-graph/cascade monitoring) and L3 (human
# oversight). The registry is chosen to test that fairly: it spans pure
# guardrails, gateways, observability/eval platforms, multi-agent runtimes,
# and dedicated human-in-the-loop tools.

defaults:
  # Coding reads the doc pages below (robots-aware, cached). Where a tool's
  # L1/L3 features live on a deeper guardrails/admin page than its overview
  # (a systematic pattern the research flagged), a second URL is included.
  min_seconds_between_requests: 2
  cache_subdir: tool_docs

